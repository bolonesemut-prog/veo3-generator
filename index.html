<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VEO3 GEN">
<meta name="theme-color" content="#080A0F">
<title>VEO3 JSON Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #080A0F; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  color: #E8DCC8;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

.orb1 {
  position: fixed; top: -200px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.orb2 {
  position: fixed; bottom: -150px; left: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(91,143,168,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 110px;
  min-height: 100vh;
}

/* HEADER */
.header {
  padding: 48px 20px 20px;
  border-bottom: 1px solid rgba(201,169,110,0.15);
  margin-bottom: 0;
}
.header-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #C9A96E;
  opacity: 0.6;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #E8DCC8;
  line-height: 1.2;
}
.header-sub {
  font-style: italic;
  font-size: 14px;
  color: #8A7A62;
  margin-top: 4px;
}

/* TAB BAR */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: #6A5F4F;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}
.tab.active { background: rgba(201,169,110,0.12); }

/* SECTION PANEL */
.section-panel {
  padding: 20px 16px 8px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* FIELDS */
.field-group { margin-bottom: 16px; }
.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #6A5F4F;
  text-transform: uppercase;
  margin-bottom: 7px;
  display: block;
}

textarea, input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  color: #E8DCC8;
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
  line-height: 1.5;
  -webkit-appearance: none;
}
textarea:focus, input[type="text"]:focus {
  border-color: rgba(201,169,110,0.4);
}
textarea { min-height: 72px; }

/* CHIPS */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}
.chip {
  padding: 5px 11px;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #6A5F4F;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

/* DIVIDER */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.15), transparent);
  margin: 16px;
}

/* PROGRESS */
.progress-wrap {
  padding: 14px 16px 0;
  display: flex;
  gap: 5px;
}
.progress-bar {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.progress-meta {
  padding: 6px 16px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.progress-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #4A3F2F;
  letter-spacing: 0.1em;
}
.reset-btn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  color: #6A5F4F;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
}

/* JSON OUTPUT */
.json-panel {
  margin: 16px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 4px;
  overflow: hidden;
  animation: fadeIn 0.4s ease;
}
.json-header {
  padding: 10px 14px;
  background: rgba(201,169,110,0.08);
  border-bottom: 1px solid rgba(201,169,110,0.12);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.json-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #C9A96E;
}
.json-body {
  padding: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  line-height: 1.8;
  color: #A09070;
  overflow-x: auto;
  max-height: 320px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.copy-btn {
  padding: 5px 12px;
  background: rgba(201,169,110,0.15);
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 2px;
  color: #C9A96E;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn.copied {
  background: rgba(74,155,114,0.2);
  border-color: rgba(74,155,114,0.4);
  color: #4A9B72;
}
.copy-notice {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #4A9B72;
  letter-spacing: 0.1em;
  padding: 6px 14px 10px;
}

/* GENERATE BTN */
.generate-btn {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  padding: 15px 44px;
  background: linear-gradient(135deg, #C9A96E, #8B6040);
  border: none;
  border-radius: 2px;
  color: #080A0F;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.25em;
  cursor: pointer;
  box-shadow: 0 0 40px rgba(201,169,110,0.25), 0 4px 20px rgba(0,0,0,0.6);
  transition: all 0.2s;
  white-space: nowrap;
}
.generate-btn:active {
  transform: translateX(-50%) scale(0.97);
  box-shadow: 0 0 20px rgba(201,169,110,0.15);
}

/* INSTALL BANNER */
.install-banner {
  margin: 12px 16px 0;
  padding: 10px 14px;
  background: rgba(91,143,168,0.08);
  border: 1px solid rgba(91,143,168,0.2);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.install-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #5B8FA8;
  letter-spacing: 0.08em;
  line-height: 1.5;
}
.install-btn {
  flex-shrink: 0;
  padding: 5px 12px;
  background: rgba(91,143,168,0.15);
  border: 1px solid rgba(91,143,168,0.3);
  border-radius: 2px;
  color: #5B8FA8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  cursor: pointer;
}

/* JSON SYNTAX COLORS */
.jk { color: #8BB4C8; }
.jv { color: #A8C8A0; }
.jn { color: #D4A070; }
</style>
</head>
<body>

<div class="orb1"></div>
<div class="orb2"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">GOOGLE VEO 3 · PROMPT TOOLKIT</div>
    <h1>JSON PROMPT<br>GENERATOR</h1>
    <div class="header-sub">Craft cinematic video prompts for VEO 3</div>
  </div>

  <!-- INSTALL BANNER -->
  <div class="install-banner" id="installBanner" style="display:none">
    <div class="install-text">📲 Install ke Home Screen<br>untuk akses offline</div>
    <button class="install-btn" id="installBtn">INSTALL</button>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- SECTION CONTENT -->
  <div id="sectionContent"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap"></div>
  <div class="progress-meta">
    <span class="progress-count" id="progressCount"></span>
    <button class="reset-btn" onclick="resetAll()">RESET ALL</button>
  </div>

  <!-- JSON OUTPUT -->
  <div id="jsonOutput" style="display:none">
    <div class="divider"></div>
    <div class="json-panel">
      <div class="json-header">
        <span class="json-title">▸ GENERATED PROMPT JSON</span>
        <button class="copy-btn" id="copyBtn" onclick="copyJSON()">COPY</button>
      </div>
      <div class="json-body" id="jsonBody"></div>
      <div class="copy-notice" id="copyNotice" style="display:none">✓ Prompt copied — ready to paste into VEO 3</div>
    </div>
  </div>

  <div style="height:20px"></div>
</div>

<!-- GENERATE BTN -->
<button class="generate-btn" onclick="generateJSON()">⬡ GENERATE JSON PROMPT</button>

<script>
// ============================================================
// DATA MODEL
// ============================================================
const sections = [
  { key: "scene",      label: "SCENE",      icon: "🏯", color: "#C9A96E" },
  { key: "character",  label: "CHARACTER",  icon: "⚔️", color: "#8B6A9B" },
  { key: "camera",     label: "CAMERA",     icon: "🎬", color: "#5B8FA8" },
  { key: "lighting",   label: "LIGHTING",   icon: "🕯️", color: "#D4A070" },
  { key: "audio",      label: "SOUND",      icon: "🎵", color: "#4A9B72" },
  { key: "voiceover",  label: "VOICEOVER",  icon: "🗣️", color: "#A86B5B" },
  { key: "technical",  label: "TECHNICAL",  icon: "⚙️", color: "#6B8FA8" },
];

const defaultData = {
  scene:     { visual_description:"", setting:"", time_of_day:"", weather:"" },
  character: { appearance:"", clothing:"", action:"", emotion:"" },
  camera:    { shot_type:"", movement:"", lens:"", notes:"" },
  lighting:  { style:"", color_palette:"", mood:"", shadow_quality:"" },
  audio:     { ambient_sound:"", music_style:"", sfx:"" },
  voiceover: { text:"", language:"", tone:"", delivery:"" },
  technical: { duration:"8", aspect_ratio:"9:16", quality:"ultra-high", visual_style:"" },
};

let data = JSON.parse(JSON.stringify(defaultData));
let activeSection = "scene";
let generatedJSON = "";

// ============================================================
// CHIPS CONFIG
// ============================================================
const chips = {
  time_of_day:   ["Dawn","Morning","Noon","Golden Hour","Dusk","Blue Hour","Night","Midnight"],
  weather:       ["Clear","Misty","Rainy","Stormy","Foggy","Dusty","Smoky","Overcast","Hazy"],
  emotion:       ["Calm","Determined","Grief","Rage","Melancholy","Proud","Fearless","Contemplative","Reverent"],
  shot_type:     ["Extreme Close-Up","Close-Up","Medium Shot","Wide Shot","Extreme Wide","Bird's Eye","Low Angle","Dutch Angle"],
  movement:      ["Static","Slow Push In","Pull Back","Pan Left","Pan Right","Tilt Up","Tilt Down","Orbit","Crane Up","Handheld","Dolly In","Tracking"],
  lens:          ["14mm","24mm","35mm","50mm","85mm","135mm","200mm"],
  light_style:   ["Golden Hour","Blue Hour","Moonlight","Candlelight","Torch Light","Diffused","Hard Shadows","Silhouette","Rim Light","Chiaroscuro"],
  shadow_quality:["Soft diffused","Medium","Hard dramatic","Deep chiaroscuro","Minimal","Dappled"],
  language:      ["Indonesian","English","Javanese","Sundanese"],
  delivery:      ["slow and contemplative","dramatic and powerful","soft and intimate","ancient and resonant","urgent and intense"],
  duration:      ["4","6","8","12","16","24"],
  aspect_ratio:  ["9:16","16:9","1:1","4:3","21:9"],
  quality:       ["standard","high","ultra-high","cinematic"],
  visual_style:  ["photorealistic","cinematic film","anime","oil painting","watercolor","ink wash","fantasy epic","documentary"],
};

// ============================================================
// RENDER TABS
// ============================================================
function renderTabs() {
  const bar = document.getElementById("tabBar");
  bar.innerHTML = sections.map(s => `
    <div class="tab ${s.key === activeSection ? 'active' : ''}"
         style="${s.key === activeSection ? `border-color:${s.color};color:${s.color};background:${s.color}18` : ''}"
         onclick="switchTab('${s.key}')">
      ${s.icon} ${s.label}
    </div>
  `).join('');
}

function switchTab(key) {
  activeSection = key;
  renderTabs();
  renderSection();
  document.getElementById("jsonOutput").style.display = "none";
}

// ============================================================
// CHIP HELPER
// ============================================================
function chipRow(section, field, options, labelFn) {
  const color = sections.find(s => s.key === section).color;
  const current = data[section][field];
  return `<div class="chip-row">${options.map(opt => {
    const val = opt;
    const label = labelFn ? labelFn(opt) : opt;
    const active = current === val;
    return `<div class="chip" 
      style="${active ? `border-color:${color};color:${color};background:${color}20` : ''}"
      onclick="toggleChip('${section}','${field}','${val.replace(/'/g,"\\'")}')">
      ${label}
    </div>`;
  }).join('')}</div>`;
}

function textarea(section, field, placeholder, rows=3) {
  return `<textarea rows="${rows}" placeholder="${placeholder}"
    oninput="updateField('${section}','${field}',this.value)"
  >${data[section][field]}</textarea>`;
}

function textinput(section, field, placeholder) {
  return `<input type="text" placeholder="${placeholder}"
    value="${data[section][field].replace(/"/g,'&quot;')}"
    oninput="updateField('${section}','${field}',this.value)">`;
}

function field(label, content) {
  return `<div class="field-group">
    <label class="field-label">${label}</label>
    ${content}
  </div>`;
}

// ============================================================
// RENDER SECTION
// ============================================================
function renderSection() {
  const color = sections.find(s => s.key === activeSection).color;
  const icon = sections.find(s => s.key === activeSection).icon;
  const label = sections.find(s => s.key === activeSection).label;

  let html = `<div class="section-panel">
    <div class="section-title" style="color:${color}">${icon} ${label}</div>`;

  switch(activeSection) {
    case "scene":
      html += field("Visual Description", textarea("scene","visual_description","Describe the main visual scene in detail...",4));
      html += field("Setting / Location", textinput("scene","setting","e.g. Ancient Majapahit palace courtyard at the edge of the sea..."));
      html += field("Time of Day", chipRow("scene","time_of_day", chips.time_of_day));
      html += field("Weather / Atmosphere", chipRow("scene","weather", chips.weather));
      break;

    case "character":
      html += field("Physical Appearance", textarea("character","appearance","e.g. A tall Javanese warrior, dark bronze skin, sharp penetrating eyes...",3));
      html += field("Clothing & Accessories", textarea("character","clothing","e.g. Gold-trimmed batik parang cloth, ceremonial keris at waist...",3));
      html += field("Action / Pose", textinput("character","action","e.g. Standing at the bow of the ship, gazing toward the horizon..."));
      html += field("Emotion / Expression", chipRow("character","emotion", chips.emotion));
      break;

    case "camera":
      html += field("Shot Type", chipRow("camera","shot_type", chips.shot_type));
      html += field("Camera Movement", chipRow("camera","movement", chips.movement));
      html += field("Lens", chipRow("camera","lens", chips.lens));
      html += field("Additional Camera Notes", textinput("camera","notes","e.g. Extremely slow drift, frame holds 2s before subtle pull back..."));
      break;

    case "lighting":
      html += field("Lighting Style", chipRow("lighting","style", chips.light_style));
      html += field("Color Palette", textinput("lighting","color_palette","e.g. Teal, deep gold, void black, ember orange..."));
      html += field("Mood / Tone", textinput("lighting","mood","e.g. Heavy, sacred, melancholic, ancient, suffocating..."));
      html += field("Shadow Quality", chipRow("lighting","shadow_quality", chips.shadow_quality));
      break;

    case "audio":
      html += field("Ambient Sound", textarea("audio","ambient_sound","e.g. Ocean waves lapping, distant gamelan, wind through bamboo, fire...",2));
      html += field("Music Style", textinput("audio","music_style","e.g. Orchestral Javanese gamelan fused with low drone strings, 60bpm..."));
      html += field("Sound FX", textarea("audio","sfx","e.g. Distant war drums, ceremonial gong, rain on stone pavement...",2));
      break;

    case "voiceover":
      html += field("Narration Script", textarea("voiceover","text","Write the full voiceover script here...",5));
      html += field("Language", chipRow("voiceover","language", chips.language));
      html += field("Voice Tone & Character", textinput("voiceover","tone","e.g. Deep baritone, aged and weathered, male 50s, resonant..."));
      html += field("Delivery Style", chipRow("voiceover","delivery", chips.delivery));
      break;

    case "technical":
      html += field("Duration (seconds)", chipRow("technical","duration", chips.duration, v => v+"s"));
      html += field("Aspect Ratio", chipRow("technical","aspect_ratio", chips.aspect_ratio));
      html += field("Quality", chipRow("technical","quality", chips.quality));
      html += field("Visual Style", chipRow("technical","visual_style", chips.visual_style));
      break;
  }

  html += "</div>";
  document.getElementById("sectionContent").innerHTML = html;
  renderProgress();
}

// ============================================================
// PROGRESS
// ============================================================
function renderProgress() {
  const wrap = document.getElementById("progressWrap");
  wrap.innerHTML = sections.map(s => {
    const filled = Object.values(data[s.key]).filter(v => v !== "").length;
    const total = Object.keys(data[s.key]).length;
    const pct = Math.round((filled / total) * 100);
    return `<div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%;background:${s.color}"></div>
    </div>`;
  }).join('');

  const totalFilled = sections.reduce((a,s) => a + Object.values(data[s.key]).filter(v=>v!=="").length, 0);
  const totalFields = sections.reduce((a,s) => a + Object.keys(data[s.key]).length, 0);
  document.getElementById("progressCount").textContent = `${totalFilled} / ${totalFields} fields filled`;
}

// ============================================================
// FIELD UPDATES
// ============================================================
function updateField(section, field, value) {
  data[section][field] = value;
  renderProgress();
  document.getElementById("jsonOutput").style.display = "none";
}

function toggleChip(section, field, value) {
  data[section][field] = data[section][field] === value ? "" : value;
  renderSection();
  document.getElementById("jsonOutput").style.display = "none";
}

// ============================================================
// GENERATE JSON
// ============================================================
function generateJSON() {
  const clean = {};
  sections.forEach(s => {
    const filtered = Object.fromEntries(
      Object.entries(data[s.key]).filter(([,v]) => v !== "")
    );
    if (Object.keys(filtered).length > 0) clean[s.key] = filtered;
  });

  generatedJSON = JSON.stringify(clean, null, 2);

  const colored = generatedJSON
    .replace(/"([^"]+)":/g, '"<span class="jk">$1</span>":')
    .replace(/: "([^"]*)"/g, ': "<span class="jv">$1</span>"')
    .replace(/: (\d+)/g, ': <span class="jn">$1</span>');

  document.getElementById("jsonBody").innerHTML = colored;
  document.getElementById("jsonOutput").style.display = "block";
  document.getElementById("copyNotice").style.display = "none";
  document.getElementById("copyBtn").className = "copy-btn";
  document.getElementById("copyBtn").textContent = "COPY";

  setTimeout(() => {
    document.getElementById("jsonOutput").scrollIntoView({ behavior: "smooth", block: "start" });
  }, 100);
}

// ============================================================
// COPY
// ============================================================
function copyJSON() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(generatedJSON).then(() => showCopied());
  } else {
    const ta = document.createElement("textarea");
    ta.value = generatedJSON;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showCopied();
  }
}

function showCopied() {
  const btn = document.getElementById("copyBtn");
  btn.textContent = "✓ COPIED";
  btn.className = "copy-btn copied";
  document.getElementById("copyNotice").style.display = "block";
  setTimeout(() => {
    btn.textContent = "COPY";
    btn.className = "copy-btn";
  }, 2500);
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
  data = JSON.parse(JSON.stringify(defaultData));
  document.getElementById("jsonOutput").style.display = "none";
  renderSection();
}

// ============================================================
// PWA - SERVICE WORKER & INSTALL PROMPT
// ============================================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBanner").style.display = "flex";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("installBanner").style.display = "none";
});

window.addEventListener('appinstalled', () => {
  document.getElementById("installBanner").style.display = "none";
});

// Register Service Worker for offline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'veo3-gen-v1';
    const ASSETS = ['/'];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => cached))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ============================================================
// INIT
// ============================================================
renderTabs();
renderSection();
</script>
